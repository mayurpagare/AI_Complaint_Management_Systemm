{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<section class="error-page">
    <div class="error-card glass">
        <p class="eyebrow">500</p>
        <h1>Something went wrong</h1>
        <p>The server could not complete the request. Please try again shortly.</p>
        <a class="btn btn-primary" href="{{ url_for('index') }}">Return Home</a>
    </div>
</section>
{% endblock %}
