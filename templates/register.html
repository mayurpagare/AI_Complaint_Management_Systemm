{% extends "base.html" %}
{% block title %}Citizen Registration{% endblock %}
{% block content %}
<section class="auth-shell">
    <form class="auth-card glass" method="post" data-validate>
        <p class="eyebrow">Join the portal</p>
        <h1>Citizen Registration</h1>
        <label>Full Name<input type="text" name="full_name" required maxlength="120"></label>
        <label>Phone Number<input type="tel" name="phone" required maxlength="20"></label>
        <label>Email<input type="email" name="email" required maxlength="120"></label>
        <label>Password<input type="password" name="password" required minlength="8"></label>
        <label>Confirm Password<input type="password" name="confirm_password" required minlength="8"></label>
        <button class="btn btn-primary btn-full" type="submit">Create Account</button>
        <p class="form-note">Already registered? <a href="{{ url_for('auth.login') }}">Log in</a></p>
    </form>
</section>
{% endblock %}
